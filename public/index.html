<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080812">
    <meta name="description" content="ClipForge AI — Turn long videos into viral short clips with AI. Auto-captions, face tracking, and one-click export for TikTok, Reels, and Shorts.">
    <meta name="robots" content="noindex">
    <meta property="og:title" content="ClipForge AI — Viral Clip Generator">
    <meta property="og:description" content="AI-powered clip generator. Paste a YouTube link, get viral short-form clips in minutes.">
    <meta property="og:type" content="website">
    <title>ClipForge AI — Viral Clip Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <!-- Preload critical assets -->
    <link rel="preload" href="/app.js" as="script">
  </head>
  <body>

    <!-- ── Auth ── -->
    <section id="authShell" class="auth-shell">
      <div class="auth-glow"></div>
      <div class="auth-ambient-1"></div>
      <div class="auth-ambient-2"></div>
      <form id="authForm" class="auth-card">
        <div class="brand">
          <div class="brand-icon">⚡</div>
          <b>ClipForge AI</b>
        </div>
        <h1 id="authTitle">Welcome back</h1>
        <p id="authSub">Sign in to your account to continue</p>
        <div id="authNameRow" class="hidden">
          <input id="authName" type="text" placeholder="Your name" autocomplete="name">
        </div>
        <input id="authEmail" type="email" placeholder="Email address" autocomplete="email" required>
        <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" required>
        <button id="authSubmit" type="submit">Sign in</button>
        <div class="auth-links">
          <button type="button" class="text-btn" id="toggleAuth">Create account</button>
          <button type="button" class="text-btn" id="forgotPassword">Forgot password?</button>
        </div>
        <div id="authMessage" class="message error"></div>
        <div class="auth-feature-list">
          <div class="auth-feature">⚡ AI finds viral moments automatically</div>
          <div class="auth-feature">◎ Face tracking &amp; smart reframing</div>
          <div class="auth-feature">▶ Word-level karaoke captions</div>
        </div>
      </form>
    </section>

    <!-- ── App ── -->
    <div id="appShell" class="app-shell hidden">

      <!-- Sidebar (desktop) -->
      <aside class="side-nav">
        <div class="brand">
          <div class="brand-icon">⚡</div>
          <b>ClipForge AI</b>
        </div>
        <nav id="sideNav"></nav>
        <button class="more-btn" id="sideMoreBtn">
          <span class="more-btn-icon">≡</span>
          <span>More</span>
        </button>
        <div id="navCreditsBar"></div>
        <div class="user-box">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-info">
            <b id="userName">User</b>
            <small id="userPlan">— credits</small>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main">
        <header class="app-top">
          <div>
            <span id="pageEyebrow" class="eyebrow">Home</span>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="top-actions">
            <button class="ghost" data-view="create" style="font-size:.82rem;padding:8px 14px">+ New clip</button>
            <button class="icon-btn" id="topMoreBtn" title="Menu">≡</button>
          </div>
        </header>

        <section id="home"       class="view active"></section>
        <section id="create"     class="view"></section>
        <section id="clips"      class="view"></section>
        <section id="clipDetail" class="view"></section>
        <section id="faceless"   class="view"></section>
        <section id="studio"     class="view"></section>
        <section id="transcript" class="view"></section>
        <section id="scheduler"  class="view"></section>
        <section id="billing"    class="view"></section>
        <section id="settings"   class="view"></section>
        <section id="admin"      class="view"></section>
      </main>

      <!-- Bottom nav (mobile) -->
      <nav id="bottomNav" class="bottom-nav"></nav>

      <!-- Drawer backdrop -->
      <div id="drawerBd" class="drawer-bd hidden"></div>

      <!-- More drawer -->
      <div id="menuDrawer" class="menu-drawer hidden">
        <div class="drawer-head">
          <div class="brand">
            <div class="brand-icon">⚡</div>
            <b>ClipForge AI</b>
          </div>
          <button class="icon-btn" id="drawerClose">✕</button>
        </div>
        <div id="drawerContent"></div>
      </div>

    </div>

    <script src="/app.js"></script>
  </body>
</html>
