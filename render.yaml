services:
  - type: web
    name: ai-clipping
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: YTDLP_PATH
        value: yt-dlp
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: YTDLP_JS_RUNTIME
        value: node
      - key: MAX_UPLOAD_BYTES
        value: 314572800
      - key: MAX_CONCURRENT_RENDER_JOBS
        value: 1
      - key: MAX_RSS_MB
        value: 420
      - key: RENDER_WIDTH
        value: 720
      - key: RENDER_HEIGHT
        value: 1280
      - key: CLIP_JOB_CREDIT_COST
        value: 5
      - key: LLM_PROVIDER
        value: emergent
      - key: LLM_MODEL
        value: gpt-4o-mini
