services:
  - type: web
    name: ai-clipping
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: YTDLP_PATH
        value: yt-dlp
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: CLIP_JOB_CREDIT_COST
        value: 5
      - key: LLM_PROVIDER
        value: emergent
      - key: LLM_MODEL
        value: gpt-4o-mini
